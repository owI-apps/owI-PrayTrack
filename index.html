<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>owI PrayTrack</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .progress-ring__circle { transition: stroke-dashoffset 0.5s; transform: rotate(-90deg); transform-origin: 50% 50%; }

        /* ========================================================== */
        /* SISTEM DARK MODE FALLBACK (Biar sub-halaman nggak ngeblend) */
        /* ========================================================== */
        html.dark { background-color: #000000; color: #F8FAFC; }
        
        /* Paksa latar putih jadi gelap */
        html.dark .bg-white { background-color: #0F172A !important; color: #F8FAFC; border-color: #1E293B !important; }
        html.dark .bg-gray-50, html.dark .bg-gray-100 { background-color: #000000 !important; }
        
        /* Paksa teks gelap jadi terang */
        html.dark .text-gray-900, html.dark .text-gray-800, html.dark .text-gray-700 { color: #F8FAFC !important; }
        html.dark .text-gray-600 { color: #CBD5E1 !important; }
        html.dark .text-gray-500, html.dark .text-gray-400 { color: #94A3B8 !important; }
        
        /* Paksa border jadi gelap */
        html.dark .border-b, html.dark .border, html.dark .border-gray-200, html.dark .border-gray-100 { border-color: #1E293B !important; }
        
        /* Paksa input jadi gelap */
        html.dark input, html.dark select { background-color: #1E293B !important; color: #F8FAFC !important; border-color: #334155 !important; }
        
        /* Perbaiki warna latar kotak pucat di dark mode */
        html.dark .bg-orange-50 { background-color: rgba(249, 115, 22, 0.1) !important; }
        html.dark .bg-green-50 { background-color: rgba(34, 197, 94, 0.1) !important; }
        html.dark .bg-sky-50 { background-color: rgba(14, 165, 233, 0.1) !important; }
        html.dark .bg-purple-50 { background-color: rgba(168, 85, 247, 0.1) !important; }
        html.dark .bg-blue-50 { background-color: rgba(59, 130, 246, 0.1) !important; }
        html.dark .bg-amber-50 { background-color: rgba(245, 158, 11, 0.1) !important; }
    </style>
</head>
<!-- BODY DEFAULT: PUTIH BERSIH UNTUK LIGHT MODE -->
<body class="bg-white font-sans text-slate-900">

    <!-- WRAPPER UTAMA (PUTIH) -->
    <div class="max-w-md mx-auto bg-white dark:bg-black min-h-screen flex flex-col relative overflow-hidden">
        
        <!-- HEADER (PUTIH & KACA) -->
        <header class="bg-white/80 dark:bg-black/80 backdrop-blur-2xl border-b border-slate-200 dark:border-slate-800 p-4 flex items-center sticky top-0 z-10">
            <div onclick="window.toggleSidebar()" class="w-12 h-12 bg-gradient-to-br from-blue-600 to-blue-700 rounded-2xl flex items-center justify-center text-white mr-3 cursor-pointer active:scale-95 transition-transform shadow-lg shadow-blue-500/20 overflow-hidden">
                <img src="" alt="Logo" class="w-full h-full object-cover hidden" id="app-logo">
                <span id="logo-placeholder" class="font-black text-sm">owI</span>
            </div>
            <div>
                <h1 class="text-2xl font-extrabold text-slate-900 dark:text-white leading-none tracking-tight">owI <span class="text-blue-600 dark:text-blue-400">PrayTrack</span></h1>
            </div>
        </header>

        <!-- KONTEN HALAMAN -->
        <main class="flex-1 overflow-y-auto hide-scrollbar p-5 pb-24" id="main-content"></main>

        <!-- SIDEBAR OVERLAY -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm opacity-0 pointer-events-none z-20 transition-opacity duration-300" onclick="window.toggleSidebar()"></div>
        
        <!-- SIDEBAR -->
        <div id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-white dark:bg-[#0F172A] shadow-2xl z-30 transform -translate-x-full transition-transform duration-300 flex flex-col rounded-r-3xl border-r border-slate-200 dark:border-slate-800">
            <div class="p-6 bg-gradient-to-br from-blue-800 to-blue-900 dark:from-blue-900 dark:to-black text-white rounded-br-3xl">
                <h2 class="text-xl font-bold">owI PrayTrack</h2>
                <p class="text-sm opacity-70 mt-1">Pengaturan & Info</p>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-1">
                <button onclick="window.editProfile()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-200 transition-colors">
                    <i data-lucide="user" class="w-5 h-5 text-slate-400 dark:text-slate-500"></i> <span id="sidebar-profile-btn">Edit Nama</span>
                </button>
                
                <button onclick="window.toggleTheme()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-200 transition-colors">
                    <i data-lucide="moon" class="w-5 h-5 text-slate-400 dark:text-slate-500"></i> <span id="sidebar-theme-btn">Tema Gelap</span>
                </button>
                
                <button onclick="window.toggleLang()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-200 transition-colors">
                    <i data-lucide="globe" class="w-5 h-5 text-slate-400 dark:text-slate-500"></i> <span id="sidebar-lang-btn">Bahasa: Indonesia</span>
                </button>
                
                <div class="py-2"><hr class="border-slate-100 dark:border-slate-800"></div>
                
                <button onclick="window.resetData()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-red-50 dark:hover:bg-red-900/20 text-red-500 transition-colors">
                    <i data-lucide="trash-2" class="w-5 h-5"></i> Reset Data
                </button>
                
                <div class="py-2"><hr class="border-slate-100 dark:border-slate-800"></div>
                
                <a href="https://trakteer.id/owi_apps/gift" target="_blank" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-amber-50 dark:hover:bg-amber-900/10 text-amber-600 dark:text-amber-400 font-semibold transition-colors">
                    <i data-lucide="heart" class="w-5 h-5"></i> Dukung App Kami
                </a>
            </div>
        </div>

        <!-- BOTTOM NAVBAR -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/80 dark:bg-black/80 backdrop-blur-2xl pt-2 pb-4 px-4 z-10 border-t border-slate-200 dark:border-slate-800">
            <div class="flex justify-around">
                <button onclick="window.navigateTo('dashboard')" class="nav-btn flex flex-col items-center text-xs text-blue-600 dark:text-blue-400 pt-1" data-tab="dashboard">
                    <i data-lucide="layout-dashboard" class="w-6 h-6"></i><span class="font-bold mt-1">Home</span>
                </button>
                <button onclick="window.navigateTo('sholat')" class="nav-btn flex flex-col items-center text-xs text-slate-400 dark:text-slate-500 pt-1" data-tab="sholat">
                    <i data-lucide="check-circle" class="w-6 h-6"></i><span class="mt-1">Sholat</span>
                </button>
                <button onclick="window.navigateTo('quran')" class="nav-btn flex flex-col items-center text-xs text-slate-400 dark:text-slate-500 pt-1" data-tab="quran">
                    <i data-lucide="book-open" class="w-6 h-6"></i><span class="mt-1">Quran</span>
                </button>
                <button onclick="window.navigateTo('utang')" class="nav-btn flex flex-col items-center text-xs text-slate-400 dark:text-slate-500 pt-1" data-tab="utang">
                    <i data-lucide="clock" class="w-6 h-6"></i><span class="mt-1">Utang</span>
                </button>
                <button onclick="window.navigateTo('amalJariyah')" class="nav-btn flex flex-col items-center text-xs text-slate-400 dark:text-slate-500 pt-1" data-tab="amalJariyah">
                    <i data-lucide="heart-handshake" class="w-6 h-6"></i><span class="mt-1">Amal</span>
                </button>
            </div>
        </nav>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
