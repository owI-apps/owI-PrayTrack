<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>owI PrayTrack 98</title>
    
    <!-- FONT RETRO 98 -->
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { 
            font-family: 'VT323', monospace; 
            background-color: #008080; /* Warna Desktop Teal Khas 98 */
            color: #000;
            font-size: 18px;
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; } .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* SISTEM WIN 98 */
        .win98-window {
            background: #C0C0C0;
            border-top: 2px solid #FFFFFF;
            border-left: 2px solid #FFFFFF;
            border-right: 2px solid #404040;
            border-bottom: 2px solid #404040;
            box-shadow: 1px 1px 0 0 #000;
        }
        .win98-titlebar {
            background: #000080;
            color: #FFF;
            font-weight: bold;
            padding: 2px 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
        }
        .win98-btn {
            background: #C0C0C0;
            border-top: 2px solid #FFFFFF;
            border-left: 2px solid #FFFFFF;
            border-right: 2px solid #404040;
            border-bottom: 2px solid #404040;
            font-family: 'VT323', monospace;
            cursor: pointer;
            padding: 4px 8px;
            font-size: 16px;
            outline: 1px solid #000;
        }
        .win98-btn:active {
            border-top: 2px solid #404040;
            border-left: 2px solid #404040;
            border-right: 2px solid #FFFFFF;
            border-bottom: 2px solid #FFFFFF;
        }
        input, select {
            font-family: 'VT323', monospace;
            font-size: 16px;
            background: #FFF;
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #FFFFFF;
            border-bottom: 2px solid #FFFFFF;
            padding: 2px 4px;
        }
        input[type="checkbox"] {
            appearance: auto;
            width: 16px;
            height: 16px;
        }
        /* Hilangkan semua border-radius bawaan tailwind */
        *, *::before, *::after { border-radius: 0 !important; }
    </style>
</head>
<body>

    <div class="max-w-md mx-auto min-h-screen flex flex-col relative overflow-hidden">
        
        <!-- TASKBAR ATAS (Header) -->
        <header class="win98-window" style="border: none; border-bottom: 2px solid #404040;">
            <div class="win98-titlebar" onclick="window.toggleSidebar()" style="cursor: pointer;">
                <span>owI PrayTrack</span>
                <div style="display: flex; gap: 2px;">
                    <button class="win98-btn" style="padding: 0 4px; font-size: 12px;">_</button>
                    <button class="win98-btn" style="padding: 0 4px; font-size: 12px;">X</button>
                </div>
            </div>
        </header>

        <!-- KONTEN HALAMAN -->
        <main class="flex-1 overflow-y-auto hide-scrollbar p-2 pb-12" id="main-content"></main>

        <!-- SIDEBAR OVERLAY -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 hidden z-20" onclick="window.toggleSidebar()"></div>
        
        <!-- SIDEBAR 98 -->
        <div id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-teal-800 z-30 transform -translate-x-full transition-transform duration-300 p-4 border-r-2 border-gray-900 shadow-2xl">
            <h2 class="text-white font-bold text-xl border-b border-gray-400 pb-2 mb-4">Start Menu</h2>
            <div class="space-y-2 text-white">
                <button onclick="window.editProfile()" class="w-full text-left p-2 hover:bg-teal-700">👤 <span id="sidebar-profile-btn">Edit Nama</span></button>
                <button onclick="window.toggleTheme()" class="w-full text-left p-2 hover:bg-teal-700">🌙 <span id="sidebar-theme-btn">Tema Gelap</span></button>
                <button onclick="window.resetData()" class="w-full text-left p-2 hover:bg-red-900 text-red-200">🗑️ Reset Data</button>
                <a href="https://trakteer.id/owi_apps/gift" target="_blank" class="block w-full text-left p-2 hover:bg-teal-700 text-amber-400">☕ Dukung App</a>
            </div>
        </div>

        <!-- TASKBAR BAWAH (Navbar) -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto win98-window z-10" style="border: none; border-top: 2px solid #FFFFFF;">
            <div class="flex justify-around p-1">
                <button onclick="window.navigateTo('dashboard')" class="nav-btn win98-btn flex-1 mx-1 text-center text-sm" data-tab="dashboard">🏠 Home</button>
                <button onclick="window.navigateTo('sholat')" class="nav-btn win98-btn flex-1 mx-1 text-center text-sm" data-tab="sholat">🤲 Sholat</button>
                <button onclick="window.navigateTo('quran')" class="nav-btn win98-btn flex-1 mx-1 text-center text-sm" data-tab="quran">📖 Quran</button>
                <button onclick="window.navigateTo('utang')" class="nav-btn win98-btn flex-1 mx-1 text-center text-sm" data-tab="utang">⏳ Utang</button>
                <button onclick="window.navigateTo('amalJariyah')" class="nav-btn win98-btn flex-1 mx-1 text-center text-sm" data-tab="amalJariyah">💰 Amal</button>
            </div>
        </nav>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
