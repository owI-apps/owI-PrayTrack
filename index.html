<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>owI PrayTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <!-- WRAPPER UTAMA -->
    <div class="max-w-md mx-auto bg-gray-100 min-h-screen flex flex-col relative overflow-hidden">

        <!-- HEADER -->
        <header class="bg-white shadow-sm p-4 flex items-center sticky top-0 z-10">
            <!-- LOGO YANG BISA DIKLIK BUAT BUKA SIDEBAR -->
            <div onclick="window.toggleSidebar()" class="w-12 h-12 bg-sky-100 rounded-full flex items-center justify-center text-sky-500 mr-3 cursor-pointer active:scale-95 transition-transform overflow-hidden">
                <img src="" alt="Logo" class="w-full h-full object-cover hidden" id="app-logo">
                <span id="logo-placeholder" class="font-bold text-sm">LOGO</span>
            </div>
            <div>
                <h1 class="text-2xl font-extrabold text-sky-700 leading-none">owI</h1>
                <h2 class="text-sm text-gray-500 font-medium -mt-1">Pray Track</h2>
            </div>
        </header>

        <!-- KONTEN HALAMAN -->
        <main class="flex-1 overflow-y-auto hide-scrollbar p-4" id="main-content">
            <!-- Diisi via JavaScript -->
        </main>

        <!-- OVERLAY SIDEBAR -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black opacity-0 pointer-events-none z-20 transition-opacity duration-300" onclick="window.toggleSidebar()"></div>

        <!-- SIDEBAR -->
        <div id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-white shadow-2xl z-30 transform -translate-x-full transition-transform duration-300 flex flex-col">
            <div class="p-6 bg-sky-700 text-white">
                <h2 class="text-xl font-bold">owI PrayTrack</h2>
                <p class="text-sm opacity-80">Pengaturan & Info</p>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-2">
                <button class="w-full flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 text-gray-700"><i data-lucide="user" class="w-5 h-5"></i> Profile</button>
                <button onclick="window.toggleTheme()" class="w-full flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 text-gray-700"><i data-lucide="moon" class="w-5 h-5"></i> Tema Gelap</button>
                <button class="w-full flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 text-gray-700"><i data-lucide="globe" class="w-5 h-5"></i> Bahasa (ID/EN)</button>
                
                <hr class="my-3">
                
                <button onclick="window.resetData()" class="w-full flex items-center gap-3 p-3 rounded-lg hover:bg-red-50 text-red-500"><i data-lucide="trash-2" class="w-5 h-5"></i> Reset Data</button>
                
                <hr class="my-3">
                
                <a href="https://trakteer.id/owi_apps/gift" target="_blank" class="w-full flex items-center gap-3 p-3 rounded-lg hover:bg-orange-50 text-orange-500 font-semibold">
                    <i data-lucide="heart" class="w-5 h-5"></i> Dukung App Kami
                </a>
            </div>
        </div>

    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
