<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>owI PrayTrack</title>
    
    <!-- FONT PREMIUM -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .progress-ring__circle { transition: stroke-dashoffset 0.5s; transform: rotate(-90deg); transform-origin: 50% 50%; }

        /* HERO CARD GRADIENT */
        .hero-card {
            background: linear-gradient(135deg, #1E3A8A 0%, #1D4ED8 50%, #3B82F6 100%);
            position: relative; overflow: hidden;
        }
        .hero-card::before {
            content: ''; position: absolute; top: -50%; right: -20%; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 70%); border-radius: 50%;
        }
        html.dark .hero-card { background: linear-gradient(135deg, #172554 0%, #1E3A8A 100%); }

        /* TRIPLE SHADOW PREMIUM */
        .premium-card {
            box-shadow: 0 4px 6px -1px rgba(148, 163, 184, 0.05), 0 10px 15px -3px rgba(148, 163, 184, 0.08), 0 20px 25px -5px rgba(148, 163, 184, 0.06);
        }
        html.dark .premium-card {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }

        /* KARTU MOTIVASI HIJAU MATCHA */
        .motivation-card {
            background: linear-gradient(135deg, #ECFDF5 0%, #D1FAE5 100%); /* Matcha Soft */
            border-left: 5px solid #047857; /* Emerald-700 Tegas */
        }
        html.dark .motivation-card {
            background: linear-gradient(135deg, #064E3B 0%, #022C22 100%); /* Dark Matcha */
            border-left: 5px solid #34D399;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 font-sans text-slate-900 dark:text-slate-50 transition-colors duration-300">

    <!-- WRAPPER UTAMA -->
    <div class="max-w-md mx-auto min-h-screen flex flex-col relative overflow-hidden">
        
        <!-- HEADER PREMIUM -->
        <header class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl border-b border-slate-200 dark:border-slate-700 p-4 flex items-center sticky top-0 z-10">
            <div onclick="window.toggleSidebar()" class="w-12 h-12 bg-gradient-to-br from-blue-600 to-blue-700 rounded-2xl flex items-center justify-center text-white mr-3 cursor-pointer active:scale-95 transition-transform shadow-lg shadow-blue-600/30 overflow-hidden">
                <img src="" alt="Logo" class="w-full h-full object-cover hidden" id="app-logo">
                <span id="logo-placeholder" class="font-black text-sm">owI</span>
            </div>
            <div>
                <h1 class="text-2xl font-extrabold text-slate-900 dark:text-white leading-none tracking-tight">owI <span class="text-blue-600 dark:text-blue-400">PrayTrack</span></h1>
            </div>
        </header>

        <!-- KONTEN HALAMAN -->
        <main class="flex-1 overflow-y-auto hide-scrollbar p-5 pb-24" id="main-content"></main>

        <!-- SIDEBAR OVERLAY -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm opacity-0 pointer-events-none z-20 transition-opacity duration-300" onclick="window.toggleSidebar()"></div>
        
        <!-- SIDEBAR PREMIUM -->
        <div id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-white dark:bg-slate-800 shadow-2xl z-30 transform -translate-x-full transition-transform duration-300 flex flex-col rounded-r-3xl">
            <div class="p-6 bg-gradient-to-br from-blue-800 to-blue-900 text-white rounded-br-3xl">
                <h2 class="text-xl font-bold">owI PrayTrack</h2>
                <p class="text-sm opacity-70 mt-1">Pengaturan & Info</p>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-1">
                <button onclick="window.editProfile()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 transition-colors">
                    <i data-lucide="user" class="w-5 h-5 text-slate-400 dark:text-slate-500"></i> <span id="sidebar-profile-btn">Edit Nama</span>
                </button>
                
                <button onclick="window.toggleTheme()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 transition-colors">
                    <i data-lucide="moon" class="w-5 h-5 text-slate-400 dark:text-slate-500"></i> <span id="sidebar-theme-btn">Tema Gelap</span>
                </button>
                
                <button onclick="window.toggleLang()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 transition-colors">
                    <i data-lucide="globe" class="w-5 h-5 text-slate-400 dark:text-slate-500"></i> <span id="sidebar-lang-btn">Bahasa: Indonesia</span>
                </button>
                
                <div class="py-2"><hr class="border-slate-100 dark:border-slate-700"></div>
                
                <button onclick="window.resetData()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-red-50 dark:hover:bg-red-900/30 text-red-500 transition-colors">
                    <i data-lucide="trash-2" class="w-5 h-5"></i> Reset Data
                </button>
                
                <div class="py-2"><hr class="border-slate-100 dark:border-slate-700"></div>
                
                <a href="https://trakteer.id/owi_apps/gift" target="_blank" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-amber-50 dark:hover:bg-amber-900/20 text-amber-600 font-semibold transition-colors">
                    <i data-lucide="heart" class="w-5 h-5"></i> Dukung App Kami
                </a>
            </div>
        </div>

        <!-- BOTTOM NAVBAR PREMIUM -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl pt-2 pb-4 px-4 z-10 border-t border-slate-200 dark:border-slate-700 shadow-[0_-4px_20px_rgba(0,0,0,0.03)] dark:shadow-[0_-4px_20px_rgba(0,0,0,0.4)]">
            <div class="flex justify-around">
                <button onclick="window.navigateTo('dashboard')" class="nav-btn flex flex-col items-center text-xs text-blue-600 dark:text-blue-400 pt-1" data-tab="dashboard">
                    <i data-lucide="layout-dashboard" class="w-6 h-6"></i><span class="font-bold mt-1">Home</span>
                </button>
                <button onclick="window.navigateTo('sholat')" class="nav-btn flex flex-col items-center text-xs text-slate-400 dark:text-slate-500 pt-1" data-tab="sholat">
                    <i data-lucide="check-circle" class="w-6 h-6"></i><span class="mt-1">Sholat</span>
                </button>
                <button onclick="window.navigateTo('quran')" class="nav-btn flex flex-col items-center text-xs text-slate-400 dark:text-slate-500 pt-1" data-tab="quran">
                    <i data-lucide="book-open" class="w-6 h-6"></i><span class="mt-1">Quran</span>
                </button>
                <button onclick="window.navigateTo('utang')" class="nav-btn flex flex-col items-center text-xs text-slate-400 dark:text-slate-500 pt-1" data-tab="utang">
                    <i data-lucide="clock" class="w-6 h-6"></i><span class="mt-1">Utang</span>
                </button>
                <button onclick="window.navigateTo('amalJariyah')" class="nav-btn flex flex-col items-center text-xs text-slate-400 dark:text-slate-500 pt-1" data-tab="amalJariyah">
                    <i data-lucide="heart-handshake" class="w-6 h-6"></i><span class="mt-1">Amal</span>
                </button>
            </div>
        </nav>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
